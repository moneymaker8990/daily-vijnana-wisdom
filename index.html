<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e1b4b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MindVanta" />
    <meta name="description" content="Ancient wisdom for modern seekers - sacred texts, meditation, and dream journal" />
    <title>MindVanta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <!-- If the JS entry never runs (404, CSP) or hangs before paint, show guidance after a delay -->
    <script>
      window.setTimeout(function () {
        var r = document.getElementById('root');
        if (!r || r.children.length > 0) return;
        r.innerHTML =
          '<div style="color:#e2e8f0;padding:2rem;font-family:system-ui,sans-serif;max-width:34rem;margin:0 auto;line-height:1.5">' +
          '<h1 style="font-size:1.1rem;margin:0 0 0.75rem;font-weight:600">This page did not finish loading</h1>' +
          '<p style="margin:0 0 0.75rem;opacity:0.9">The app scripts may be blocked or still caching an old version. Try a hard refresh (Ctrl+Shift+R), another network, or clear site data and unregister the service worker for this site.</p>' +
          '</div>';
      }, 12000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
